<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お金と人生シミュレーション</title>
<style>
:root {
  --bg-1: #FFF9F0; --bg-2: #FFEFD5; --primary: #264653; --primary-light: #2A6F97;
  --accent: #E9C46A; --money: #F4A261; --time: #4A90D9; --health: #2A9D8F;
  --danger: #BC4749; --text: #264653; --text-sec: #666; --border: #DDD; --card-bg: #FFFFFF;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
  background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
  min-height: 100vh; color: var(--text); line-height: 1.6; padding: 16px 0 100px;
}
#app { max-width: 720px; margin: 0 auto; padding: 0 16px; }
.screen { display: none; }
.screen.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.title-wrap { text-align: center; padding: 40px 20px 20px; }
.title-wrap h1 { font-size: 30px; margin: 16px 0 8px; color: var(--primary); }
.title-wrap .subtitle { font-size: 14px; color: var(--text-sec); margin-bottom: 32px; }
.title-figure { width: 110px; height: 110px; margin: 0 auto; }
.title-meta { background: white; border-radius: 12px; padding: 20px; margin: 24px 0; text-align: left; }
.title-meta h3 { margin: 0 0 12px; font-size: 14px; color: var(--text-sec); font-weight: normal; }
.title-meta ul { margin: 0; padding-left: 20px; font-size: 14px; }
.title-meta li { margin-bottom: 6px; }

.btn {
  display: inline-block; padding: 14px 32px; background: var(--primary);
  color: white; border: none; border-radius: 10px; font-size: 16px;
  font-weight: bold; cursor: pointer; font-family: inherit;
  transition: transform 0.1s, box-shadow 0.15s;
  box-shadow: 0 2px 8px rgba(38,70,83,0.2);
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(38,70,83,0.3); }
.btn:active { transform: translateY(0); }
.btn:disabled { background: #BBB; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-large { padding: 18px 48px; font-size: 18px; }
.btn-secondary { background: white; color: var(--primary); border: 2px solid var(--primary); }
.btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }

.section-title { font-size: 20px; font-weight: bold; margin: 0 0 8px; color: var(--primary); }
.section-desc { font-size: 14px; color: var(--text-sec); margin-bottom: 20px; }

.budget-bar {
  background: var(--accent); color: var(--primary); padding: 14px 16px;
  border-radius: 10px; text-align: center; font-weight: bold; margin-bottom: 16px;
  position: sticky; top: 8px; z-index: 5; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.budget-bar.over { background: var(--danger); color: white; }
.budget-bar .small { font-size: 12px; font-weight: normal; opacity: 0.85; display: block; margin-top: 4px; }

.stat-row { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.stat-row .stat-name { font-weight: bold; font-size: 16px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.stat-row .stat-desc { font-size: 12px; color: var(--text-sec); margin-bottom: 12px; }
.stat-row.money .stat-name::before { content: '💰'; }
.stat-row.time .stat-name::before { content: '⏰'; }
.stat-row.health .stat-name::before { content: '💪'; }

.rank-row { display: flex; gap: 6px; justify-content: space-between; }
.rank-btn {
  flex: 1; padding: 12px 4px; border: 2px solid var(--border);
  background: white; border-radius: 8px; cursor: pointer;
  font-family: inherit; text-align: center; transition: all 0.15s;
}
.rank-btn:hover:not(.disabled) { border-color: var(--primary); }
.rank-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }
.rank-btn.disabled { opacity: 0.35; cursor: not-allowed; }
.rank-btn .rank { font-size: 18px; font-weight: bold; display: block; }
.rank-btn .cost { font-size: 11px; opacity: 0.7; }

.skill-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.skill-card {
  background: white; border: 2px solid var(--border); border-radius: 12px;
  padding: 16px; cursor: pointer; transition: all 0.15s; text-align: left;
}
.skill-card:hover { border-color: var(--primary); transform: translateY(-2px); }
.skill-card.selected { border-color: var(--primary); background: linear-gradient(135deg, #FFF, #FFF9E6); box-shadow: 0 4px 16px rgba(38,70,83,0.15); }
.skill-emoji { font-size: 32px; display: block; margin-bottom: 6px; line-height: 1; }
.skill-name { font-weight: bold; margin-bottom: 4px; font-size: 16px; color: var(--primary); }
.skill-desc { font-size: 12px; color: var(--text-sec); line-height: 1.4; }

.status-card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.05); }
.character-display { text-align: center; margin-bottom: 16px; }
.character-display svg { width: 80px; height: 80px; }
.character-display .label { display: inline-block; padding: 6px 16px; background: linear-gradient(135deg, var(--accent), var(--money)); color: var(--primary); border-radius: 16px; font-weight: bold; margin-top: 8px; font-size: 14px; }
.stat-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
.stat-summary-item { text-align: center; padding: 14px 4px; border-radius: 10px; background: #F8F8F8; position: relative; }
.stat-summary-item .icon { font-size: 24px; }
.stat-summary-item .label { font-size: 12px; color: var(--text-sec); margin: 2px 0; }
.stat-summary-item .value { font-size: 22px; font-weight: bold; color: var(--primary); }
.stat-summary-item .value.stars { color: var(--money); letter-spacing: 1px; font-size: 18px; }
.stat-summary-item .trait-badge { display: inline-block; padding: 2px 8px; background: var(--primary); color: white; border-radius: 10px; font-size: 11px; font-weight: bold; margin-top: 4px; }
.stat-summary-item .trait-badge.S { background: var(--money); }
.stat-summary-item .trait-badge.A { background: var(--accent); color: var(--primary); }
.stat-summary-item .trait-badge.B { background: var(--primary); }
.stat-summary-item .trait-badge.C { background: #888; }
.stat-summary-item .trait-badge.D { background: var(--danger); }
.stat-summary-item .trait-mult { font-size: 10px; color: var(--text-sec); display: block; margin-top: 2px; }

.status-bar {
  position: sticky; top: 8px; background: var(--primary); color: white;
  padding: 12px 14px; border-radius: 12px; margin-bottom: 8px;
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
  z-index: 10; box-shadow: 0 4px 16px rgba(38,70,83,0.2);
}
.status-bar .item { text-align: center; }
.status-bar .item .ic { font-size: 16px; }
.status-bar .item .lbl { font-size: 11px; color: var(--accent); display: block; margin: 2px 0; }
.status-bar .item .val { font-size: 18px; font-weight: bold; }
.status-bar .item .val.stars { color: var(--money); letter-spacing: 1px; font-size: 14px; }
.status-bar .item .trait { display: block; padding: 1px 6px; background: var(--accent); color: var(--primary); border-radius: 8px; font-size: 10px; font-weight: bold; margin: 4px auto 0; width: fit-content; }

.inventory-bar {
  background: white; border: 2px solid var(--accent); border-radius: 12px;
  padding: 10px 14px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px; font-size: 13px;
}
.inventory-bar .inv-label { font-weight: bold; color: var(--primary); min-width: fit-content; }
.inventory-bar .inv-slots { display: flex; gap: 6px; flex: 1; flex-wrap: wrap; }
.inv-slot {
  display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px;
  background: linear-gradient(135deg, #FFF6E6, #FFE9B8);
  border: 1px solid var(--accent); border-radius: 16px;
  font-size: 12px; font-weight: bold; color: var(--primary);
}
.inv-slot .item-emoji { font-size: 14px; }
.inv-slot.empty { background: #F0F0F0; border: 1px dashed #CCC; color: #999; font-weight: normal; }

.event-stage-label { text-align: center; font-size: 12px; color: var(--text-sec); margin-bottom: 4px; letter-spacing: 0.1em; }
.event-age-display { text-align: center; margin-bottom: 8px; }
.event-age-display .age-label { display: inline-block; padding: 6px 18px; background: var(--primary); color: white; border-radius: 16px; font-size: 18px; font-weight: bold; }
.event-character { text-align: center; margin-bottom: 16px; }
.event-character svg { width: 60px; height: 60px; }
.event-title { text-align: center; font-size: 22px; font-weight: bold; margin: 8px 0; color: var(--primary); }
.event-desc { text-align: center; color: var(--text-sec); margin-bottom: 24px; font-size: 14px; padding: 0 12px; }

.item-event-badge { display: inline-block; padding: 4px 12px; background: linear-gradient(135deg, var(--accent), var(--money)); color: var(--primary); border-radius: 12px; font-weight: bold; font-size: 13px; margin-bottom: 8px; }
.random-event-badge {
  display: inline-block; padding: 6px 16px; color: white; border-radius: 14px;
  font-weight: bold; font-size: 14px; margin-bottom: 8px;
  animation: pulse 1.5s ease-in-out infinite;
}
.random-event-badge.neg { background: var(--danger); }
.random-event-badge.pos { background: var(--health); }
.random-event-badge.fixed { background: var(--money); }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
.random-effects-box { background: white; border: 2px solid var(--border); border-radius: 12px; padding: 16px; margin: 16px 0; text-align: center; }
.random-effects-box .label { font-size: 13px; color: var(--text-sec); margin-bottom: 8px; }
.random-effects-box .choice-effects { justify-content: center; }

.choice-btn {
  display: block; width: 100%; padding: 16px 18px; margin-bottom: 12px;
  background: white; border: 2px solid var(--border); border-radius: 12px;
  text-align: left; cursor: pointer; font-family: inherit; transition: all 0.15s;
}
.choice-btn:hover:not(.locked) { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.08); }
.choice-btn.locked { background: #F0F0F0; border-color: #CCC; border-style: dashed; cursor: not-allowed; }
.choice-btn.locked .choice-label, .choice-btn.locked .choice-detail { color: #999; }
.choice-btn.item-choice { border: 2px solid var(--accent); background: linear-gradient(135deg, #FFFEF8, #FFF9E6); }
.choice-btn.item-choice:hover:not(.locked) { border-color: var(--money); background: linear-gradient(135deg, #FFFEF8, #FFF1C2); }
.choice-btn.stochastic { border: 2px dashed var(--time); background: linear-gradient(135deg, #FFF, #EAF2FB); }
.choice-label { font-weight: bold; font-size: 17px; margin-bottom: 6px; color: var(--primary); }
.choice-detail { color: var(--text-sec); margin-bottom: 10px; font-size: 13px; line-height: 1.5; }
.choice-item-reward { background: rgba(244,162,97,0.15); border-left: 3px solid var(--money); padding: 8px 12px; margin: 8px 0; border-radius: 4px; font-size: 13px; color: var(--primary); }
.choice-item-reward .reward-label { font-weight: bold; }
.choice-effects { display: flex; gap: 6px; flex-wrap: wrap; font-size: 11px; }
.effect-tag { display: inline-block; padding: 3px 10px; border-radius: 12px; background: #F0F0F0; color: var(--text-sec); font-weight: bold; }
.effect-tag.positive { background: #E8F4F1; color: var(--health); }
.effect-tag.negative { background: #FCEAE3; color: var(--danger); }
.effect-tag.boosted { background: #FFE9B8; color: var(--money); border: 1px solid var(--money); }
.lock-reason { margin-top: 8px; padding: 6px 10px; background: rgba(188,71,73,0.1); color: var(--danger); border-radius: 6px; font-size: 12px; font-weight: bold; }
.item-bonus-tag { margin-top: 8px; padding: 6px 10px; background: linear-gradient(135deg, #FFF6E6, #FFE9B8); color: var(--money); border: 1px solid var(--accent); border-radius: 6px; font-size: 12px; font-weight: bold; }
.item-activation { margin-bottom: 12px; padding: 10px 14px; background: linear-gradient(135deg, #E8F4F1, #C7E6DC); color: var(--health); border: 2px solid var(--health); border-radius: 8px; font-size: 13px; font-weight: bold; text-align: center; }
.stochastic-tag { margin-top: 8px; padding: 6px 10px; background: rgba(74,144,217,0.1); color: var(--time); border-radius: 6px; font-size: 12px; font-weight: bold; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.modal { background: white; border-radius: 16px; padding: 24px; max-width: 480px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
.modal h3 { margin: 0 0 12px; color: var(--primary); }
.modal p { font-size: 14px; color: var(--text-sec); margin-bottom: 16px; }
.modal .discard-item { display: flex; align-items: center; gap: 12px; padding: 12px; border: 2px solid var(--border); border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
.modal .discard-item:hover { border-color: var(--danger); background: #FCEAE3; }
.modal .discard-item .emoji { font-size: 28px; }
.modal .discard-item .info { flex: 1; }
.modal .discard-item .name { font-weight: bold; color: var(--primary); }
.modal .discard-item .desc { font-size: 12px; color: var(--text-sec); }
.modal .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }

.result-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 14px 24px; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.2); font-weight: bold; z-index: 100; animation: slideUp 0.3s; max-width: 90%; }
.result-toast.item { background: var(--money); }
.result-toast.success { background: var(--health); }
.result-toast.failure { background: var(--danger); }
@keyframes slideUp { from { transform: translate(-50%, 100%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

.ending-wrap { text-align: center; padding: 20px 0; }
.ending-title { font-size: 22px; margin: 12px 0; color: var(--text-sec); }
.ending-type { display: inline-block; padding: 14px 28px; background: linear-gradient(135deg, var(--accent), var(--money)); color: var(--primary); border-radius: 28px; font-weight: bold; font-size: 22px; margin: 20px 0; box-shadow: 0 4px 16px rgba(244,162,97,0.3); }
.ending-summary { background: white; border-radius: 12px; padding: 20px; margin: 20px 0; text-align: left; font-size: 14px; line-height: 1.7; }
.ending-summary h4 { margin: 16px 0 8px; color: var(--primary); }
.ending-summary h4:first-child { margin-top: 0; }
.history-list { list-style: none; padding: 0; margin: 0; }
.history-list li { padding: 8px 0; border-bottom: 1px solid #F0F0F0; font-size: 13px; display: flex; gap: 12px; }
.history-list li:last-child { border-bottom: none; }
.history-list .age-tag { font-weight: bold; color: var(--primary-light); flex-shrink: 0; width: 80px; }
.ending-items { display: flex; gap: 10px; flex-wrap: wrap; padding: 12px; background: linear-gradient(135deg, #FFF6E6, #FFE9B8); border-radius: 12px; margin-top: 8px; }
.ending-items .ending-item { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: white; border: 1px solid var(--accent); border-radius: 16px; font-size: 13px; font-weight: bold; color: var(--primary); }

@media (max-width: 480px) {
  .skill-grid { grid-template-columns: 1fr; }
  .title-wrap h1 { font-size: 24px; }
  .event-title { font-size: 20px; }
  .ending-type { font-size: 18px; padding: 12px 20px; }
}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-container"></div>

<script>
// ============================================
// Game Data
// ============================================
const SKILLS = [
  { id: 'lucky',  name: '豪運',       emoji: '🍀', desc: '突発イベントの発生率は下がるが、良い結果が出やすくなる' },
  { id: 'early',  name: '先手必勝',   emoji: '⚡', desc: '序盤（20代）の選択効果が1.5倍。若いうちに勝負タイプ' },
  { id: 'steady', name: 'コツコツ努力', emoji: '🌱', desc: '同じ方向の選択を続けるとボーナス。後半逆転タイプ' },
  { id: 'focus',  name: '超集中',     emoji: '🎯', desc: 'スキル系イベント（勉強等）の効果が2倍' },
  { id: 'tough',  name: '健康体',     emoji: '💪', desc: '健康への悪い影響が半減。激務でも倒れにくい' },
  { id: 'moody',  name: '気分屋',     emoji: '🎭', desc: '突発イベントの効果がランダムに+か-に振れる' },
  { id: 'pace',   name: 'マイペース', emoji: '🐢', desc: '全ての突発イベントの効果が×0.7に' },
];

const TRAIT_MULT = { 1: 0.5, 2: 0.75, 3: 1.0, 4: 1.25, 5: 1.5 };
const RANK_LABEL = { 1: 'D', 2: 'C', 3: 'B', 4: 'A', 5: 'S' };
const STAT_LABELS = { money: '💰お金', time: '⏰時間', health: '💪健康' };
const MAX_ITEMS = 3;

const ITEMS = {
  savings:   { id: 'savings',   name: 'コツコツ貯金', emoji: '💴', desc: '老後資金UP。持ち続けると毎ステージお金が少しずつ減る（積立）', sellable: true,  category: 'function' },
  cert:      { id: 'cert',      name: '資格証',       emoji: '🎓', desc: '転職・独立で収入UP',              sellable: false, category: 'function' },
  insurance: { id: 'insurance', name: '保険加入証',   emoji: '📋', desc: '突発イベントのマイナス効果を完全になくす（消費）', sellable: true,  category: 'function' },
  gym:       { id: 'gym',       name: 'ジム会員',     emoji: '💪', desc: '健康悪化を回避。スポーツで活躍が発生',  sellable: true,  category: 'function' },
  network:   { id: 'network',   name: '人脈帳',       emoji: '🤝', desc: '転職・キャリアでチャンスが舞い込む',  sellable: false, category: 'function' },
  sidebiz:   { id: 'sidebiz',   name: '副業ノウハウ', emoji: '💼', desc: '副業系の収入が大きくアップ',         sellable: true,  category: 'function' },
  skillup:   { id: 'skillup',   name: 'スキルアップ', emoji: '📚', desc: '専門職の転職を可能にし、一般職の転職効果も強化', sellable: false, category: 'function' },
  spouse:    { id: 'spouse',    name: '配偶者',       emoji: '💍', desc: 'デート（健康+）が発生。たまにケンカも', sellable: false, category: 'life' },
  child:     { id: 'child',     name: '子ども',       emoji: '👶', desc: '40代に運動会・文化祭が発生し健康UP', sellable: false, category: 'life' },
  house:     { id: 'house',     name: '持ち家',       emoji: '🏠', desc: '老後の家賃がゼロに',                sellable: true,  category: 'life' },
};

// ステージ定義
// choices に id を付与し、history で参照できるようにする
// requiresHistory: 前のステージで特定の選択をしている必要がある
// customLock: 動的なロック判定（state を引数に取る）
// isStochastic: 確率で成功/失敗が決まる選択肢
// onChosenTriggers: この選択を選んだ瞬間に確率発生する追加イベント
const STAGES = [
  {
    age: '20代前半', title: '進路を決める',
    desc: '社会人デビュー。最初の選択が、その後の毎日を大きく変える。',
    choices: [
      { id: 'general',  label: '一般企業に就職', detail: '安定した会社員。失業のリスクあり', effects: { money: 15, time: -5, health: 0 } },
      { id: 'specialist', label: '専門職に就く', detail: '専門スキルで安定。失業はないが、転職にはスキルアップが必要', effects: { money: 18, time: -5, health: 0 } },
      { id: 'freelance', label: 'フリーター', detail: '自由だが収入は不安定。気ままに働く', effects: { money: 0, time: 15, health: 0 } },
    ],
  },
  {
    age: '20代中盤', title: '住まいを決める',
    desc: '家を出るタイミング。どこで、どう暮らす？',
    choices: [
      { id: 'tokyo',  label: '東京で一人暮らし', detail: '便利だが家賃が高い。仕事のチャンスは多い', effects: { money: -20, time: -5, health: 0 }, requires: { money: 45 } },
      { id: 'suburb', label: '郊外で一人暮らし', detail: '家賃は安め。通勤・買い物が少し不便', effects: { money: -10, time: -5, health: 0 } },
      { id: 'home',   label: '実家暮らしを継続', detail: 'お金と時間が貯まる。自立感は薄い',     effects: { money: 13, time: 5, health: 0 } },
    ],
    itemEvent: {
      title: 'コツコツ貯金を始める？',
      desc: '月5万を強制積立。今と将来の備えを少しずつ。持ち続けると毎ステージお金が減っていく',
      itemId: 'savings',
      effects: { money: -8, time: 0, health: 0 },
      requires: { money: 30 },
    },
  },
  {

// 称号ロジック
function determineTitle(stats) {
  const { money, time, health } = stats;
  if (money >= 80 && time < 40) return '高収入激務型';
  if (money >= 80 && time >= 60 && health >= 60) return '理想バランス型';
  if (time >= 80 && health >= 60) return '自由ゆとり型';
  if (health >= 80 && money >= 60) return '健康成功者型';
  if (health >= 80) return '健康長寿型';
  if (money >= 70 && health >= 60) return '稼ぐ健康型';
  if (money >= 70) return 'お金優先型';
  if (time >= 70) return '時間優先型';
  if (health >= 70) return '健康優先型';
  if (Math.abs(money - time) <= 10 && Math.abs(time - health) <= 10) return 'バランス型';
  return '自分らしい人生型';
}

// 数値→記号変換
function numberToSymbol(n) {
  if (n >= 25) return '＋＋＋';
  if (n >= 10) return '＋＋';
  if (n >= 1) return '＋';
  if (n === 0) return '';
  if (n >= -9) return '−';
  if (n >= -24) return '−−';
  return '−−−';
}

function valueToStars(v) {
  let filled = 0;
  if (v >= 1 && v <= 20) filled = 1;
  else if (v <= 40) filled = 2;
  else if (v <= 60) filled = 3;
  else if (v <= 80) filled = 4;
  else if (v >= 81) filled = 5;
  return '★'.repeat(filled) + '☆'.repeat(5 - filled);
}

function valueToRank(v) {
  if (v <= 20) return 'D';
  if (v <= 40) return 'C';
  if (v <= 60) return 'B';
  if (v <= 80) return 'A';
  return 'S';
}

// アイテム判定
function hasItem(itemId) { return state && state.items && state.items.includes(itemId); }
function consumeItem(itemId) {
  const idx = state.items.indexOf(itemId);
  if (idx >= 0) state.items.splice(idx, 1);
}

// 過去の選択を判定
function hasChosen(stageIndex, choiceId) {
  if (!state.history[stageIndex]) return false;
  return state.history[stageIndex].choiceId === choiceId;
}

// 選択肢へのアイテムボーナス
function getItemBonusForChoice(stageIndex, choiceIndex) {
  const stage = STAGES[stageIndex];
  const choice = stage.choices[choiceIndex];
  const applied = [];
  let multiplier = 1.0;

  // 🎓資格証: 「勉強」「仕事に専念」「リーダー」で +30%
  if (hasItem('cert') && ['study', 'work_focus', 'leader'].includes(choice.id)) {
    multiplier *= 1.3;
    applied.push('cert');
  }
  // 🤝人脈帳: 「出世」「リーダー」「転職」で +30%
  if (hasItem('network') && ['promote', 'leader', 'transfer'].includes(choice.id)) {
    multiplier *= 1.3;
    applied.push('network');
  }
  // 💼副業ノウハウ: 「投資」で +50%
  if (hasItem('sidebiz') && choice.id === 'invest') {
    multiplier *= 1.5;
    applied.push('sidebiz');
  }
  // 📚スキルアップ: 「転職」を選んだ一般職に +30%（成功時の効果UP）
  if (hasItem('skillup') && choice.id === 'transfer') {
    const stage1 = state.history[0];
    if (stage1 && stage1.choiceId === 'general') {
      multiplier *= 1.3;
      applied.push('skillup');
    }
  }
  return { multiplier, applied };
}

function applyItemModifier(effects, stageIndex, choiceIndex) {
  if (choiceIndex === undefined || choiceIndex < 0) {
    return { effects, itemBonus: { multiplier: 1.0, applied: [] } };
  }
  const itemBonus = getItemBonusForChoice(stageIndex, choiceIndex);
  if (itemBonus.multiplier === 1.0) return { effects, itemBonus };
  const e = { ...effects };
  for (const k of Object.keys(e)) {
    if (e[k] > 0) e[k] = Math.round(e[k] * itemBonus.multiplier);
  }
  return { effects: e, itemBonus };
}

function applyTraitModifier(effects, traits) {
  const e = { ...effects };
  for (const k of Object.keys(e)) {
    if (e[k] > 0 && traits[k]) {
      e[k] = Math.round(e[k] * TRAIT_MULT[traits[k]]);
    }
  }
  return e;
}

function applySkillModifier(effects, stageIndex, skillId, history) {
  const e = { ...effects };
  switch (skillId) {
    case 'early':
      if (stageIndex <= 2) for (const k of Object.keys(e)) e[k] = Math.round(e[k] * 1.5);
      break;
    case 'tough':
      if (e.health < 0) e.health = Math.round(e.health * 0.5);
      break;
    case 'focus':
      if (STAGES[stageIndex] && STAGES[stageIndex].isSkillEvent) {
        for (const k of Object.keys(e)) e[k] = Math.round(e[k] * 2);
      }
      break;
    case 'steady':
      if (stageIndex >= 2) for (const k of Object.keys(e)) { if (e[k] > 0) e[k] += 5; }
      break;
    // 豪運・気分屋・マイペース は突発イベント用なので、ここでは何もしない
  }
  return e;
}

function computeFinalEffects(baseEffects, stageIndex, skillId, traits, history, choiceIndex) {
  let e = applyTraitModifier(baseEffects, traits);
  e = applySkillModifier(e, stageIndex, skillId, history);
  const { effects, itemBonus } = applyItemModifier(e, stageIndex, choiceIndex);
  e = effects;
  e._itemBonus = itemBonus;
  return e;
}

function checkChoiceLock(choice, currentNums) {
  // ステ要件
  if (choice.requires) {
    for (const [stat, minVal] of Object.entries(choice.requires)) {
      if (currentNums[stat] < minVal) {
        const requiredRank = valueToRank(minVal);
        const currentRank = valueToRank(currentNums[stat]);
        return { locked: true, reason: `${STAT_LABELS[stat]} ${requiredRank}以上必要（現在 ${currentRank}）` };
      }
    }
  }
  // 履歴要件
  if (choice.requiresHistory) {
    for (const req of choice.requiresHistory) {
      const histItem = state.history[req.stage];
      if (!histItem || histItem.choiceId !== req.choiceId) {
        return { locked: true, reason: req.reason || `特定の選択が必要` };
      }
    }
  }
  // カスタム判定
  if (choice.customLock) {
    const result = choice.customLock(state);
    if (result.locked) return result;
  }
  return { locked: false };
}

// 突発イベント抽選（確定イベント優先、ランダムは1個まで）
function rollEvents() {
  const fired = [];
  const candidates = [];

  for (const ev of RANDOM_EVENTS) {
    // condition チェック
    let conditionMet = true;
    if (ev.condition) {
      try { conditionMet = ev.condition(state); } catch (e) { conditionMet = false; }
    }
    if (!conditionMet) continue;

    if (ev.kind === 'fixed') {
      // 確定イベントは即座にfired
      fired.push(ev);
      continue;
    }

    // ランダム抽選
    let prob = 0;
    if (ev.fixedProb !== undefined) {
      prob = ev.fixedProb;
    } else if (ev.statKey && ev.probTable) {
      const rank = valueToRank(state.nums[ev.statKey]);
      prob = ev.probTable[rank] || 0;
    }

    // 性格スキル「豪運」: 発生率↓、結果は良くなる
    if (state.skill === 'lucky') {
      prob = prob * 0.6;
    }

    if (prob > 0 && Math.random() < prob) {
      candidates.push(ev);
    }
  }

  // ランダム枠から1つ選ぶ
  if (candidates.length > 0) {
    fired.push(candidates[Math.floor(Math.random() * candidates.length)]);
  }
  return fired;
}

// 突発イベントの効果を性格スキル＆アイテムで調整
function computeRandomEffects(ev) {
  const e = { ...ev.effects };
  const activatedItems = [];

  // 健康体: 健康への悪影響を半減
  if (state.skill === 'tough' && e.health && e.health < 0) {
    e.health = Math.round(e.health * 0.5);
  }
  // マイペース: 全効果×0.7
  if (state.skill === 'pace') {
    for (const k of Object.keys(e)) e[k] = Math.round(e[k] * 0.7);
  }
  // 気分屋: ランダムに+か-に振れる（±50%でブレ）
  if (state.skill === 'moody') {
    for (const k of Object.keys(e)) {
      const factor = 0.5 + Math.random();  // 0.5〜1.5
      e[k] = Math.round(e[k] * factor);
    }
  }
  // 豪運: 結果が良くなる（負を半減、正を1.3倍）
  if (state.skill === 'lucky') {
    for (const k of Object.keys(e)) {
      if (e[k] < 0) e[k] = Math.round(e[k] * 0.5);
      else if (e[k] > 0) e[k] = Math.round(e[k] * 1.3);
    }
  }

  // 📋保険加入証: マイナス効果を完全になくす（消費）
  if (ev.kind === 'neg' && hasItem('insurance')) {
    for (const k of Object.keys(e)) {
      if (e[k] < 0) e[k] = 0;
    }
    activatedItems.push('insurance');
  }

  e._activatedItems = activatedItems;
  return e;
}

// ============================================
let state = null;

function newGame() {
  state = {
    screen: 'title',
    statRanks: { money: null, time: null, health: null },
    skill: null,
    nums: { money: 50, time: 50, health: 50 },
    stageIndex: 0,
    subStep: 'main',
    pendingEvents: [],  // 抽選後のイベントキュー
    currentRandomEvent: null,
    history: [],
    items: [],
  };
}

newGame();

// ステージ開始時の処理
function startStage() {
  state.subStep = 'main';
  state.currentRandomEvent = null;
  state.pendingEvents = [];

  // 最初の2ステージはイベント発生なし
  if (state.stageIndex <= 1) return;

  // コツコツ貯金の毎ステージ積立コスト
  if (hasItem('savings')) {
    state.nums.money = Math.max(0, state.nums.money - 3);
  }

  // 突発イベントを抽選
  const fired = rollEvents();
  if (fired.length > 0) {
    state.pendingEvents = fired;
    state.currentRandomEvent = state.pendingEvents.shift();
    state.subStep = 'random';
  }
}

const $app = document.getElementById('app');
const $modal = document.getElementById('modal-container');

function render() {
  $app.innerHTML = '';
  const screen = document.createElement('div');
  screen.className = 'screen active';
  switch (state.screen) {
    case 'title':       screen.appendChild(renderTitle()); break;
    case 'create-stat': screen.appendChild(renderCreateStat()); break;
    case 'create-skill':screen.appendChild(renderCreateSkill()); break;
    case 'confirm':     screen.appendChild(renderConfirm()); break;
    case 'play':        screen.appendChild(renderPlay()); break;
    case 'ending':      screen.appendChild(renderEnding()); break;
  }
  $app.appendChild(screen);
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function el(tag, opts = {}, ...children) {
  const e = document.createElement(tag);
  if (opts.class) e.className = opts.class;
  if (opts.html) e.innerHTML = opts.html;
  if (opts.text) e.textContent = opts.text;
  if (opts.onclick) e.onclick = opts.onclick;
  if (opts.attrs) Object.entries(opts.attrs).forEach(([k,v]) => e.setAttribute(k, v));
  for (const c of children) {
    if (c) e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

function renderCreateStat() {
  const w = el('div');
  w.appendChild(el('h2', { class: 'section-title', text: 'STEP 1：あなたの素質を決めよう' }));
  w.appendChild(el('p', { class: 'section-desc', html: '3つの素質に <b>10ポイント</b> を振り分けます。<br><span style="font-size:12px;color:#888">S = 1.5倍 ／ A = 1.25倍 ／ B = 1.0倍 ／ C = 0.75倍 ／ D = 0.5倍</span>' }));

  const total = ['money','time','health'].reduce((s,k) => s + (state.statRanks[k] || 0), 0);
  const remaining = 10 - total;
  const budgetEl = el('div', { class: 'budget-bar' + (remaining < 0 ? ' over' : '') });
  budgetEl.innerHTML = `残りポイント： <span style="font-size:24px">${remaining}</span> / 10
    <span class="small">D=1点 / C=2点 / B=3点 / A=4点 / S=5点</span>`;
  w.appendChild(budgetEl);

  const STATS = [
    { key: 'money', label: 'お金', desc: '収入を得る力。高いとプラス効果が増える' },
    { key: 'time',  label: '時間', desc: '時間を作る力。高いとプラス効果が増える' },
    { key: 'health',label: '健康', desc: '体力と回復力。高いとプラス効果が増える' },
  ];
  const RANKS = [['D',1],['C',2],['B',3],['A',4],['S',5]];

  for (const stat of STATS) {
    const row = el('div', { class: `stat-row ${stat.key}` });
    row.appendChild(el('div', { class: 'stat-name', text: stat.label }));
    row.appendChild(el('div', { class: 'stat-desc', text: stat.desc }));
    const rankRow = el('div', { class: 'rank-row' });
    for (const [r, cost] of RANKS) {
      const selected = state.statRanks[stat.key] === cost;
      const wouldOverflow = !selected && (total - (state.statRanks[stat.key]||0) + cost > 10);
      const btn = el('button', {
        class: `rank-btn ${selected ? 'selected':''} ${wouldOverflow ? 'disabled':''}`,
        onclick: () => {
          if (wouldOverflow) return;
          state.statRanks[stat.key] = selected ? null : cost;
          render();
        },
      });
      btn.innerHTML = `<span class="rank">${r}</span><span class="cost">×${TRAIT_MULT[cost]}</span>`;
      rankRow.appendChild(btn);
    }
    row.appendChild(rankRow);
    w.appendChild(row);
  }

  const allSet = STATS.every(s => state.statRanks[s.key] !== null);
  const valid = allSet && total <= 10;

  const btnRow = el('div', { class: 'btn-row' });
  btnRow.appendChild(el('button', { class: 'btn btn-secondary', text: '戻る', onclick: () => goto('title') }));
  const nextBtn = el('button', { class: 'btn', text: '次へ：性格を選ぶ →', onclick: () => goto('create-skill') });

  w.appendChild(btnRow);
  return w;

function renderMainStep(w, stage) {
  w.appendChild(el('div', { class: 'event-title', text: stage.title }));
  w.appendChild(el('div', { class: 'event-desc', text: stage.desc }));
  if (stage.desc2) w.appendChild(el('div', { class: 'event-desc', attrs: { style: 'color:#E76F51; font-size:12px' }, text: '※ ' + stage.desc2 }));

  const traits = state.statRanks;
  for (let i = 0; i < stage.choices.length; i++) {
    const c = stage.choices[i];
    const lockInfo = checkChoiceLock(c, state.nums);

    // 確率系の選択肢
    if (c.isStochastic) {
      const btn = el('button', {
        class: `choice-btn stochastic ${lockInfo.locked ? 'locked' : ''}`,
        onclick: lockInfo.locked ? null : () => makeMainChoice(i),
      });
      let reasonHtml = lockInfo.locked ? `<div class="lock-reason">🔒 ${lockInfo.reason}</div>` : '';
      btn.innerHTML = `
        <div class="choice-label">🎲 ${c.label}${lockInfo.locked ? ' 🔒' : ''}</div>
        <div class="choice-detail">${c.detail}</div>
        <div class="stochastic-tag">確率で成功 or 失敗</div>
        ${reasonHtml}
      `;
      w.appendChild(btn);
      continue;
    }

    const previewEffects = computeFinalEffects(c.effects, state.stageIndex, state.skill, traits, state.history, i);
    const itemBonus = previewEffects._itemBonus || { applied: [] };

    const btn = el('button', {
      class: `choice-btn ${lockInfo.locked ? 'locked' : ''}`,
      onclick: lockInfo.locked ? null : () => makeMainChoice(i),
    });

    let tagsHtml = '';
    for (const [k, v] of Object.entries(previewEffects)) {
      if (k.startsWith('_')) continue;
      const symbol = numberToSymbol(v);
      if (!symbol) continue;
      const baseV = c.effects[k];
      const cls = v > 0 ? (baseV > 0 && v > baseV ? 'boosted' : 'positive') : 'negative';
      tagsHtml += `<span class="effect-tag ${cls}">${STAT_LABELS[k]} ${symbol}</span>`;
    }

    let rewardHtml = '';
    if (c.gainItem) {
      const it = ITEMS[c.gainItem];
      rewardHtml = `<div class="choice-item-reward"><span class="reward-label">獲得：</span>${it.emoji} ${it.name}（${it.desc}）</div>`;
    }

    let bonusHtml = '';
    if (itemBonus.applied && itemBonus.applied.length > 0) {
      const bonusNames = itemBonus.applied.map(id => `${ITEMS[id].emoji}${ITEMS[id].name}`).join(' + ');
      bonusHtml = `<div class="item-bonus-tag">✨ ${bonusNames} 効果でブースト</div>`;
    }

    let reasonHtml = lockInfo.locked ? `<div class="lock-reason">🔒 ${lockInfo.reason}</div>` : '';

    btn.innerHTML = `
      <div class="choice-label">${c.label}${lockInfo.locked ? ' 🔒' : ''}</div>
      <div class="choice-detail">${c.detail}</div>
      ${rewardHtml}
      <div class="choice-effects">${tagsHtml}</div>
      ${bonusHtml}
      ${reasonHtml}
    `;
    w.appendChild(btn);
  }
  return w;
}

  let tagsHtml = '';

    if (k.startsWith('_')) continue;
    const symbol = numberToSymbol(v);
    if (!symbol) continue;
    const cls = v > 0 ? 'positive' : 'negative';
    tagsHtml += `<span class="effect-tag ${cls}">${STAT_LABELS[k]} ${symbol}</span>`;
  }

  let itemActivationHtml = '';
  if (activatedItems.length > 0) {
    const names = activatedItems.map(id => `${ITEMS[id].emoji} ${ITEMS[id].name}`).join(' + ');
    itemActivationHtml = `<div class="item-activation">🛡️ ${names} が発動！ マイナス効果を打ち消しました（消費）</div>`;

function makeMainChoice(choiceIndex) {
  const stage = STAGES[state.stageIndex];
  const choice = stage.choices[choiceIndex];

  // 確率系の選択
  if (choice.isStochastic) {
    let successRate = 0.5;
    // スキルアップ持ちは成功率UP
    if (hasItem('skillup')) successRate += 0.2;
    // 人脈帳持ちは成功率さらにUP
    if (hasItem('network')) successRate += 0.15;
    const success = Math.random() < successRate;
    let effects = success ? { ...choice.successEffects } : { ...choice.failureEffects };

    // スキルアップ＋一般職: 成功時さらに効果UP
    if (success && hasItem('skillup')) {
      const stage1 = state.history[0];
      if (stage1 && stage1.choiceId === 'general') {
        for (const k of Object.keys(effects)) {
          if (effects[k] > 0) effects[k] = Math.round(effects[k] * 1.3);
        }
      }
    }

    // 素質倍率・性格スキルを適用
    effects = applyTraitModifier(effects, state.statRanks);
    effects = applySkillModifier(effects, state.stageIndex, state.skill, state.history);

    for (const k of Object.keys(effects)) {
      state.nums[k] = Math.max(0, Math.min(100, state.nums[k] + effects[k]));
    }

    state.history.push({
      age: stage.age, title: stage.title, choice: choice.label + (success ? '（成功！）' : '（失敗...）'),
      choiceId: choice.id, choiceIndex, effects, stochasticResult: success ? 'success' : 'failure',
    });

    showToast(success ? `🎉 ${choice.label} 成功！` : `💔 ${choice.label} 失敗...`, false, success ? 'success' : 'failure');
    setTimeout(() => proceedAfterMain(stage), 1100);
    return;
  }

  // 通常の選択
  const effects = computeFinalEffects(choice.effects, state.stageIndex, state.skill, state.statRanks, state.history, choiceIndex);
  const itemBonus = effects._itemBonus;

  if (itemBonus && itemBonus.applied && itemBonus.applied.length > 0) {
    const names = itemBonus.applied.map(id => `${ITEMS[id].emoji}${ITEMS[id].name}`).join('・');
    showToast(`${names} 効果でブースト！`, true);
  }

  for (const k of Object.keys(effects)) {
    if (k.startsWith('_')) continue;
    state.nums[k] = Math.max(0, Math.min(100, state.nums[k] + effects[k]));
  }

  state.history.push({
    age: stage.age, title: stage.title, choice: choice.label,
    choiceId: choice.id, choiceIndex, effects,
  });

  // 投資を始めるを選んだ場合、50%で値上がりボーナス
  if (choice.id === 'invest' && Math.random() < 0.5) {
    setTimeout(() => {
      const bonus = 12;
      state.nums.money = Math.max(0, Math.min(100, state.nums.money + bonus));
      showToast(`📈 投資が値上がり！ 💰お金 ＋＋`, true);
      state.history.push({
        age: stage.age, title: '【ボーナス】投資が値上がり', choice: '舞い込んだ',
        choiceId: 'investment_win', choiceIndex: -1, effects: { money: bonus },
      });
    }, 800);
    setTimeout(() => proceedAfterMain(stage), 1700);
    return;
  }

  if (choice.gainItem) {
    setTimeout(() => handleGainItem(choice.gainItem, stage), 700);
    return;
  }

  showToast(`「${choice.label}」を選んだ`);
  setTimeout(() => proceedAfterMain(stage), 700);
}

function handleGainItem(itemId, stage) {
  const addAndProceed = () => {
    state.items.push(itemId);
    const it = ITEMS[itemId];
    showToast(`${it.emoji} ${it.name} を入手！`, true);
    setTimeout(() => proceedAfterMain(stage), 900);
  };
  if (state.items.length >= MAX_ITEMS) {
    showDiscardModal(itemId, addAndProceed, () => {
      const it = ITEMS[itemId];
      showToast(`${it.name} は手にしなかった`);
      setTimeout(() => proceedAfterMain(stage), 700);
    });
    return;
  }
  addAndProceed();
}

function proceedAfterMain(stage) {
  if (stage.itemEvent) {
    // 履歴要件チェック
    if (stage.itemEvent.requiresHistory) {
      const reqOk = stage.itemEvent.requiresHistory.every(req => {
        const histItem = state.history[req.stage];
        return histItem && histItem.choiceId === req.choiceId;
      });
      if (!reqOk) {
        advanceStage();
        return;
      }
    }
    state.subStep = 'item';
    render();
  } else {
    advanceStage();
  }
}

function makeItemChoice(takeIt) {
  const stage = STAGES[state.stageIndex];
  const ie = stage.itemEvent;

  if (!takeIt) {
    state.history.push({
      age: stage.age, title: '【アイテム】' + ie.title, choice: '入手しなかった',
      choiceId: 'item_skip', choiceIndex: 1, effects: {},
    });
    showToast(`アイテムを見送った`);
    setTimeout(() => advanceStage(), 700);
    return;
  }

  const acquireAndAdvance = () => {
    const effects = computeFinalEffects(ie.effects, state.stageIndex, state.skill, state.statRanks, state.history);
    for (const k of Object.keys(effects)) {
      if (k.startsWith('_')) continue;
      state.nums[k] = Math.max(0, Math.min(100, state.nums[k] + effects[k]));
    }
    state.history.push({
      age: stage.age, title: '【アイテム】' + ie.title, choice: '入手した',
      choiceId: 'item_take', choiceIndex: 0, effects,
    });
    state.items.push(ie.itemId);
    const it = ITEMS[ie.itemId];
    showToast(`${it.emoji} ${it.name} を入手！`, true);
    setTimeout(() => advanceStage(), 900);
  };

  if (state.items.length >= MAX_ITEMS) {
    showDiscardModal(ie.itemId, acquireAndAdvance, () => render());
  } else {
    acquireAndAdvance();
  }
}

function showDiscardModal(newItemId, onDiscarded, onGiveUp) {
  const newItem = ITEMS[newItemId];
  const modal = el('div', { class: 'modal-overlay' });
  const box = el('div', { class: 'modal' });
  box.innerHTML = `
    <h3>🎒 持ち物がいっぱいです</h3>
    <p>${newItem.emoji} <b>${newItem.name}</b> を入手したいのですが、枠が${MAX_ITEMS}個までです。<br>どのアイテムを手放しますか？</p>
  `;
  for (const itemId of state.items.slice()) {
    const it = ITEMS[itemId];
    const itemDiv = el('div', {
      class: 'discard-item',
      onclick: () => {
        const idx = state.items.indexOf(itemId);
        if (idx >= 0) state.items.splice(idx, 1);
        modal.remove();
        showToast(`${it.name} を手放した`);
        setTimeout(onDiscarded, 400);
      },
    });
    itemDiv.innerHTML = `<span class="emoji">${it.emoji}</span><div class="info"><div class="name">${it.name}</div><div class="desc">${it.desc}</div></div>`;
    box.appendChild(itemDiv);
  }
  const actions = el('div', { class: 'modal-actions' });
  actions.appendChild(el('button', {
    class: 'btn btn-secondary', text: '諦めて選び直す',
    onclick: () => { modal.remove(); onGiveUp(); },
  }));
  box.appendChild(actions);
  modal.appendChild(box);
  $modal.appendChild(modal);
}

function acceptRandomEvent() {
  const ev = state.currentRandomEvent;
  if (!ev) return;
  const effects = computeRandomEffects(ev);
  const activatedItems = effects._activatedItems || [];

  for (const k of Object.keys(effects)) {
    if (k.startsWith('_')) continue;
    state.nums[k] = Math.max(0, Math.min(100, state.nums[k] + effects[k]));
  }

  for (const itemId of activatedItems) consumeItem(itemId);
  if (activatedItems.length > 0) {
    const names = activatedItems.map(id => `${ITEMS[id].name}`).join('・');
    showToast(`${names} を使った！（消費）`, true);
  }

  state.history.push({
    age: STAGES[state.stageIndex].age,
    title: (ev.kind === 'fixed' ? '【確定】' : '【突発】') + ev.emoji + ' ' + ev.title,
    choice: ev.kind === 'neg' ? '降りかかった' : (ev.kind === 'fixed' ? '発生' : '舞い込んだ'),
    choiceId: ev.id, choiceIndex: -1, effects,
  });

  state.currentRandomEvent = null;
  // 次の保留イベントがあれば表示
  if (state.pendingEvents.length > 0) {
    state.currentRandomEvent = state.pendingEvents.shift();
    state.subStep = 'random';
    render();
  } else {
    state.subStep = 'main';
    render();
  }
}

function advanceStage() {
  state.stageIndex++;
  if (state.stageIndex >= STAGES.length) goto('ending');
  else { startStage(); render(); }
}

function showToast(msg, isItem = false, variant = null) {
  let cls = 'result-toast';
  if (variant) cls += ' ' + variant;
  else if (isItem) cls += ' item';
  const t = el('div', { class: cls, text: msg });
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 900);
}

function renderEnding() {
  const skill = SKILLS.find(s => s.id === state.skill);
  const title = determineTitle(state.nums);
  const tm = state.statRanks.money, tt = state.statRanks.time, th = state.statRanks.health;

  const w = el('div', { class: 'ending-wrap' });
  w.innerHTML = `
    <div class="character-display" style="color:#264653; margin-bottom:12px">${CHAR_SVG}</div>
    <div style="font-size:14px; color:#666;">9つのステージを終えました。</div>
  `;

  const titleSection = el('div');
  titleSection.innerHTML = `<h2 class="ending-title">あなたの人生は</h2><div class="ending-type">${skill.emoji} ${title}</div>`;
  w.appendChild(titleSection);

  const stats = el('div', { class: 'stat-summary', attrs: { style: 'margin: 24px 0' } });
  stats.innerHTML = `
    <div class="stat-summary-item"><div class="icon">💰</div><div class="label">お金</div><div class="value stars">${valueToStars(state.nums.money)}</div><div class="trait-badge ${RANK_LABEL[tm]}">素質 ${RANK_LABEL[tm]}</div></div>
    <div class="stat-summary-item"><div class="icon">⏰</div><div class="label">時間</div><div class="value stars">${valueToStars(state.nums.time)}</div><div class="trait-badge ${RANK_LABEL[tt]}">素質 ${RANK_LABEL[tt]}</div></div>
    <div class="stat-summary-item"><div class="icon">💪</div><div class="label">健康</div><div class="value stars">${valueToStars(state.nums.health)}</div><div class="trait-badge ${RANK_LABEL[th]}">素質 ${RANK_LABEL[th]}</div></div>
  `;
  w.appendChild(stats);

  if (state.items.length > 0) {
    const itemsCard = el('div', { class: 'ending-summary' });
    let itemsHtml = `<h4>🎒 手にしたもの（${state.items.length}/${MAX_ITEMS}）</h4><div class="ending-items">`;
    for (const id of state.items) {
      const it = ITEMS[id];
      itemsHtml += `<span class="ending-item">${it.emoji} ${it.name}</span>`;
    }
    itemsHtml += `</div>`;
    itemsCard.innerHTML = itemsHtml;
    w.appendChild(itemsCard);
  }

  const summary = el('div', { class: 'ending-summary' });
  let summaryHtml = `<h4>📊 人生の選択</h4><ul class="history-list">`;
  for (const h of state.history) {
    summaryHtml += `<li><span class="age-tag">${h.age}</span><span>${h.title}：${h.choice}</span></li>`;
  }
  summaryHtml += `</ul>`;
  summary.innerHTML = summaryHtml;
  w.appendChild(summary);

  const reflect = el('div', { class: 'ending-summary' });
  reflect.innerHTML = `
    <h4>💭 ふりかえり</h4>
    <p>あなたは「${skill.name}」の性格で、${title}の人生を選びました。</p>
    <p>素質と選択の組み合わせで、人生は人それぞれ。クラスの友達と比べてみよう。</p>
  `;
  w.appendChild(reflect);

  const btnRow = el('div', { class: 'btn-row' });
  btnRow.appendChild(el('button', { class: 'btn btn-secondary', text: 'キャラを変えてもう一度', onclick: () => { newGame(); goto('title'); } }));
  btnRow.appendChild(el('button', { class: 'btn', text: '同じキャラで再挑戦', onclick: () => {
    state.nums.money = 50; state.nums.time = 50; state.nums.health = 50;
    state.stageIndex = 0; state.history = []; state.items = [];
    startStage();
    goto('play');
  }}));
  w.appendChild(btnRow);
  return w;
}

function goto(screen) { state.screen = screen; render(); }
render();
</script>
</body>
</html>
